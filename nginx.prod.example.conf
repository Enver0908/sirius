# ═══════════════════════════════════════════════════════════════
# nginx.prod.example.conf — PRODUCTION HTTPS TEMPLATE
# ═══════════════════════════════════════════════════════════════
# Shopify embedded app'ler HTTPS gerektirir.
# Bu dosyayı nginx.conf olarak kopyalayıp düzenleyin.
#
# Sertifika seçenekleri:
#   1. Let's Encrypt (certbot) — önerilen
#   2. Cloudflare Origin Certificate
#   3. Cloud provider managed cert (AWS ACM, GCP, etc.)
#
# Örnek certbot kurulumu:
#   certbot certonly --webroot -w /var/www/certbot \
#     -d your-production-domain.com
# ═══════════════════════════════════════════════════════════════

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name your-production-domain.com;

    # Let's Encrypt challenge desteği
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Ana sunucu bloğu
server {
    listen 443 ssl http2;
    server_name your-production-domain.com;

    # ── SSL Sertifikaları ──
    # TODO: Gerçek sertifika yollarını girin
    ssl_certificate     /etc/letsencrypt/live/your-production-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-production-domain.com/privkey.pem;

    # ── SSL Güvenlik Ayarları ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Güvenlik Header'ları ──
    # Shopify embedded iframe için frame-ancestors gerekli
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options "" always;
    add_header Content-Security-Policy "frame-ancestors https://*.myshopify.com https://admin.shopify.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Proxy Buffer Ayarları ──
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size 256k;

    # ── Backend API ──
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # ── Health Check ──
    location /health {
        proxy_pass http://backend:3001/health;
    }

    # ── Frontend (Next.js) ──
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
