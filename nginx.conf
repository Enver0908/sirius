# ═══════════════════════════════════════════════════════════════
# nginx.conf — LOCAL DEVELOPMENT ONLY (HTTP)
# ═══════════════════════════════════════════════════════════════
# Bu dosya yalnızca local docker-compose geliştirme ortamı içindir.
# Production HTTPS yapılandırması için: nginx.prod.example.conf
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # Proxy buffer ayarları
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size 256k;

    # Backend API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check
    location /health {
        proxy_pass http://backend:3001/health;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js HMR WebSocket (dev mode)
    location /_next/webpack-hmr {
        proxy_pass http://frontend:3000/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
